<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pri:#0066cc;--pri-d:#004fa3;--pri-l:#e8f2ff;
  --sb:#1b2a4a;--sb-t:#7a92bc;--sb-h:#253a5e;
  --bg:#f0f2f7;--surface:#fff;--border:#dde3ef;
  --t1:#1a2332;--t2:#6b7a99;--t3:#a8b5cc;
  --ok:#16a34a;--warn:#f59e0b;--err:#dc2626;--info:#0ea5e9;
  --r:8px;--sh:0 2px 12px rgba(0,0,0,.08)
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px}
button{cursor:pointer;border:none;outline:none}
input,select,textarea{outline:none;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;font-family:inherit}
input:focus,select:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(0,102,204,.12)}

/* LOADING */
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b2a4a 0%,#0d5ea8 100%)}
.ld-logo{width:80px;height:80px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:rgba(255,255,255,.75);font-size:14px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b2a4a 0%,#0d5ea8 100%)}
.login-card{background:#fff;border-radius:18px;padding:48px 42px;width:430px;max-width:96vw;box-shadow:0 32px 80px rgba(0,0,0,.25)}
.login-brand{display:flex;align-items:center;gap:14px;margin-bottom:36px}
.login-brand-icon{width:52px;height:52px;background:linear-gradient(135deg,#0066cc,#00c6ff);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;flex-shrink:0}
.login-brand h2{font-size:20px;font-weight:800;color:var(--t1);line-height:1.2}
.login-brand p{font-size:12px;color:var(--t2);margin-top:2px}
.login-card h3{font-size:24px;font-weight:700;margin-bottom:6px}
.login-sub{color:var(--t2);font-size:13px;margin-bottom:28px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.fg input{width:100%;padding:11px 14px;font-size:14px}
.btn-login{background:var(--pri);color:#fff;border-radius:9px;padding:13px;font-size:15px;font-weight:700;width:100%;transition:.2s;margin-top:4px}
.btn-login:hover{background:var(--pri-d)}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;color:#dc2626;font-size:13px;margin-bottom:14px}

/* APP SHELL */
#shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:240px;background:var(--sb);color:var(--sb-t);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb::-webkit-scrollbar{width:4px}.sb::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:2px}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-logo-ic{width:40px;height:40px;background:linear-gradient(135deg,#0066cc,#00c6ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sb-logo h3{color:#fff;font-size:14px;font-weight:800;line-height:1.3}
.sb-logo p{font-size:11px;color:var(--sb-t)}
.sb-user{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-av{width:36px;height:36px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.sb-ui strong{display:block;color:#fff;font-size:13px;line-height:1.4;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-ui span{font-size:11px}
.role-pill{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;background:var(--pri-l);color:var(--pri)}
.sb-g{padding:6px 0}
.sb-gl{padding:7px 16px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.28)}
.sb-it{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;color:var(--sb-t);font-size:13.5px;transition:.15s}
.sb-it:hover{background:var(--sb-h);color:#fff}
.sb-it.active{background:var(--sb-h);color:#fff;border-left-color:var(--pri)}
.sb-ic{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-bot{margin-top:auto;border-top:1px solid rgba(255,255,255,.07);padding:6px 0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.tb-title{font-size:15px;font-weight:700;color:var(--t1);min-width:120px}
.tb-search{flex:1;max-width:300px;position:relative}
.tb-search input{padding:7px 12px 7px 34px;border-radius:18px;background:#f0f2f7;border-color:transparent;width:100%;font-size:13px}
.tb-search input:focus{background:#fff;border-color:var(--pri)}
.tb-s-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:14px}
.tb-acts{margin-left:auto;display:flex;align-items:center;gap:6px}
.ico-btn{width:36px;height:36px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--t2);cursor:pointer;transition:.15s;position:relative}
.ico-btn:hover{background:#f0f2f7;color:var(--t1)}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--err);border-radius:50%;border:2px solid #fff}
.tb-av{width:36px;height:36px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.content{flex:1;overflow-y:auto;padding:20px}
.content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.g4,.g3,.g2{grid-template-columns:1fr}}

/* CARD */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px}

/* KPI */
.kpi{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:16px 18px;border-top:4px solid currentColor;position:relative;overflow:hidden}
.kpi-lb{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.kpi-v{font-size:30px;font-weight:800;line-height:1;color:var(--t1)}
.kpi-u{font-size:14px;font-weight:500;color:var(--t2);margin-left:3px}
.kpi-tr{font-size:11px;margin-top:7px;display:flex;align-items:center;gap:3px}
.tr-ok{color:var(--ok)}.tr-dn{color:var(--err)}
.kpi-bg{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:38px;opacity:.12}

/* MODULE GRID */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.mc{background:#fff;border-radius:12px;padding:22px 14px;text-align:center;cursor:pointer;transition:.2s;box-shadow:var(--sh);border:2px solid transparent}
.mc:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.13)}
.mc-ic{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.mc-lb{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px}
.mc-ds{font-size:11px;color:var(--t2);line-height:1.4}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:10px 18px;font-size:13.5px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--pri)}
.tab.on{color:var(--pri);border-bottom-color:var(--pri)}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8f9fc;padding:10px 13px;text-align:left;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f2f7;transition:.1s}
tbody tr:hover{background:#f8f9ff}
tbody td{padding:11px 13px}
tbody tr:last-child{border-bottom:none}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b-ok{background:#dcfce7;color:#16a34a}.b-warn{background:#fef9c3;color:#b45309}
.b-err{background:#fee2e2;color:#dc2626}.b-info{background:#e0f2fe;color:#0369a1}
.b-gray{background:#f1f5f9;color:#475569}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:inherit}
.b-pri{background:var(--pri);color:#fff}.b-pri:hover{background:var(--pri-d)}
.b-ok2{background:var(--ok);color:#fff}.b-ok2:hover{background:#14803a}
.b-out{background:#fff;color:var(--t2);border:1px solid var(--border)}.b-out:hover{border-color:var(--pri);color:var(--pri)}
.b-sm{padding:5px 11px;font-size:12px}
.b-danger{background:#fee2e2;color:#dc2626}.b-danger:hover{background:#fecaca}

/* ALERT */
.alert{border-radius:8px;padding:12px 16px;display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;font-size:13px}
.a-warn{background:#fffbeb;border:1px solid #fcd34d}.a-err{background:#fef2f2;border:1px solid #fca5a5}
.a-ok{background:#f0fdf4;border:1px solid #86efac}.a-info{background:#f0f9ff;border:1px solid #7dd3fc}
.a-ic{font-size:18px;flex-shrink:0;margin-top:1px}
.a-bd strong{display:block;font-weight:700;margin-bottom:2px}
.a-bd p{color:var(--t2);font-size:12px}

/* CHART */
.chart-box{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px 20px}
.chart-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--t1)}
.chart-wrap{position:relative;height:240px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:480px;max-width:100%;max-height:92vh;overflow:auto;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.mhdr{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-size:16px;font-weight:700}
.mclose{width:32px;height:32px;border-radius:50%;background:#f0f2f7;border:none;cursor:pointer;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.mbody{padding:20px 24px}
.mfoot{padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end}

/* DROP ZONE */
.dz{border:2px dashed var(--border);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:.2s;background:#fafbff}
.dz:hover,.dz.over{border-color:var(--pri);background:var(--pri-l)}
.dz p{color:var(--t2);font-size:13px;margin-top:10px;line-height:1.5}

/* PROGRESS */
.prog{height:8px;background:#f0f2f7;border-radius:4px;overflow:hidden;margin-top:5px}
.prog-f{height:100%;border-radius:4px;transition:width .4s}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.sec-hdr h1{font-size:20px;font-weight:700}
.breadcrumb{font-size:12px;color:var(--t2);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.breadcrumb span{color:var(--pri);cursor:pointer}.breadcrumb span:hover{text-decoration:underline}

/* TOAST */
.tw-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1a2332;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:tin .3s forwards,tout .3s 3.2s forwards;max-width:320px}
.t-ok{background:#16a34a}.t-err{background:#dc2626}.t-warn{background:#b45309}
@keyframes tin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateX(20px)}}

/* APP KSCL */
.app-log{background:#1e1e2e;border-radius:8px;padding:14px 16px;font-family:Consolas,monospace;font-size:12px;max-height:360px;overflow-y:auto;border:1px solid #333}
.log-l{padding:2px 0;line-height:1.6;color:#c8c8e8;white-space:pre-wrap;word-break:break-all}
.log-l.ok{color:#4ade80}.log-l.err{color:#f87171}.log-l.warn{color:#fbbf24}.log-l.head{color:#7c6af7;font-weight:700}
.btn-upload{background:var(--pri-l);color:var(--pri);border:1px dashed var(--pri);border-radius:7px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-upload:hover{background:var(--pri);color:#fff}
.btn-run{background:#16a34a;color:#fff;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:.15s}
.btn-run:hover{background:#14803a}
.btn-back{background:#f1f5f9;color:var(--t2);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:13px;cursor:pointer;transition:.15s}
.btn-back:hover{background:#e2e8f0;color:var(--t1)}

/* TREE EDITOR */
.tree-ed{border:1px solid var(--border);border-radius:9px;overflow:hidden;background:#fff}
.te-bar{padding:10px 14px;background:#f8f9fc;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.te-row{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:7px;margin:2px 4px;transition:.15s;cursor:pointer}
.te-row:hover{background:#f0f2ff}
.te-arr{font-size:10px;color:var(--t2);width:16px;text-align:center;transition:transform .15s;flex-shrink:0}
.te-arr.o{transform:rotate(90deg)}.te-arr.h{visibility:hidden}
.te-ico{font-size:16px;flex-shrink:0}
.te-lbl{flex:1;font-size:13.5px;color:var(--t1)}
.te-act{display:flex;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0}
.te-row:hover .te-act{opacity:1}
.ta-btn{width:26px;height:26px;border-radius:6px;font-size:13px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:.15s}
.ta-add{background:#dcfce7;color:#16a34a}.ta-add:hover{background:#bbf7d0}
.ta-del{background:#fee2e2;color:#dc2626}.ta-del:hover{background:#fecaca}
.ta-ren{background:#e0f2fe;color:#0284c7}.ta-ren:hover{background:#bae6fd}
.te-children{padding-left:20px;border-left:2px dashed #e8f2ff;margin-left:14px}
.te-empty-node{padding:10px 16px;color:var(--t3);font-size:12px;font-style:italic}
.te-leaf-content{padding:10px 16px 10px 46px;font-size:13px;color:var(--t2);border-top:1px solid #f5f6fa}

/* MISC */
.divider{height:1px;background:var(--border);margin:18px 0}
.empty-state{text-align:center;padding:40px 20px;color:var(--t2)}
.empty-state .es-ic{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:13px}
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.checklist-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f0f2f7;font-size:13.5px;cursor:pointer}
.checklist-item input[type=checkbox]{width:17px;height:17px;flex-shrink:0;cursor:pointer;accent-color:var(--pri)}
.checklist-item.done{color:var(--t3);text-decoration:line-through}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f6fa;font-size:13px}
.stat-row:last-child{border:none}
.stat-row .label{color:var(--t2)}
.stat-row .value{font-weight:700;color:var(--t1)}
/* ONBOARDING ACCORDION */
.ob-acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.ob-acc-body.open{max-height:9999px}
.ob-chevron{transition:transform .25s;display:inline-block}
.ob-acc-btn.open .ob-chevron{transform:rotate(180deg)}
.ob-role-btn{transition:all .18s;cursor:pointer;border:2px solid var(--border)}
.ob-role-btn:hover{border-color:var(--pri);background:#eff6ff}
.ob-role-btn.on{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border-color:#2563eb;box-shadow:0 4px 14px rgba(37,99,235,.28)}
.ob-task-row{transition:background .12s}
.ob-task-row:hover{background:#f0f7ff}
</style>

let S={user:null,profile:null,page:'loading',tab:'',charts:{},data:{}};

/* ══════════════════════════════════════════
   FIREBASE
══════════════════════════════════════════ */
firebase.initializeApp(FB);
const auth=firebase.auth(), db=firebase.database();

auth.onAuthStateChanged(async u=>{
  if(u){
    S.user=u;
    try{
      const snap=await db.ref(`profiles/${u.uid}`).get();
      if(snap.exists()){
        S.profile=snap.val();
        if(!S.profile.role||!ROLES[S.profile.role]){
          S.profile.role=ADMIN_EMAILS.includes(u.email)?'superadmin':'viewer';
          db.ref(`profiles/${u.uid}/role`).set(S.profile.role);
        }
        go('dashboard');
      } else {
        S.profile={name:'',email:u.email,role:ADMIN_EMAILS.includes(u.email)?'superadmin':'viewer',dept:'',phone:'',createdAt:Date.now()};
        render(); showFirstLogin();
      }
    }catch(e){
      // DB rules chưa cấu hình hoặc mạng lỗi — vẫn cho vào với quyền tối thiểu
      S.profile={name:'',email:u.email,role:ADMIN_EMAILS.includes(u.email)?'superadmin':'viewer',dept:'',phone:'',createdAt:Date.now()};
      render();
      toast('Không thể kết nối database. Vui lòng liên hệ Admin.','t-err');
      if(ADMIN_EMAILS.includes(u.email))go('dashboard');
    }
  } else go('login');
});

/* ══════════════════════════════════════════
   PERMISSIONS
══════════════════════════════════════════ */
function canAccess(id){
  if(!S.profile)return false;
  const r=ROLES[S.profile.role];
  if(!r)return false;
  return r.all||(r.mods||[]).includes(id);
}
function isAdmin(){return!!(S.profile&&ROLES[S.profile.role]?.admin)}

/* ══════════════════════════════════════════
   ROUTER
══════════════════════════════════════════ */
function go(page,tab=''){
  if(page==='login'||page==='loading'){S.page=page;S.tab=tab;render();return;}
  if(!canAccess(page)){toast('Bạn không có quyền truy cập mục này','t-warn');return;}
  S.page=page;S.tab=tab||'';
  destroyCharts(); render();
}

function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy()}catch(e){}});S.charts={};}

  const el=document.getElementById('app');

}

function buildSB(){

    {lb:'Quản lý',    ids:['nhansu'],adm:true},

    return`<div class="sb-g"><div class="sb-gl">${g.lb}</div>${items.map(id=>{

function updateCL(cb,dept,idx){
  const label=cb.closest('.checklist-item');
  if(cb.checked)label.classList.add('done'); else label.classList.remove('done');
  const card=cb.closest('.card');
  const total=card.querySelectorAll('input[type=checkbox]').length;
  const done=card.querySelectorAll('input[type=checkbox]:checked').length;
  const bdg=card.querySelector('.bdg');
  if(bdg)bdg.textContent=`${done}/${total} hoàn thành`;
  if(done===total)toast(`Checklist ${dept.toUpperCase()} hoàn thành! 🎉`,'t-ok');
}
function completeCa(dept){
  if(!confirm(`Xác nhận kết thúc ca ${dept.toUpperCase()}? Dữ liệu sẽ được lưu.`))return;
  const ts=new Date().toLocaleString('vi-VN');
  db.ref(`checklist/${S.user.uid}/${dept}/${Date.now()}`).set({completedAt:ts,by:S.profile?.name||S.user.email});
  toast(`Đã lưu kết thúc ca ${dept.toUpperCase()} lúc ${ts}`,'t-ok');
}

  <button class="btn b-out b-sm" style="margin:14px 0">⬇️ Tải template mẫu (.xlsx)</button>
  <div class="dz" onclick="document.getElementById('fi2').click()" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="doDrop(event,'${mod}')">
    <div style="font-size:52px">📂</div>
    <p>Kéo thả file Excel (.xlsx, .xls, .csv) vào đây<br>hoặc <strong>click để chọn file</strong></p>
  </div>
  <input type="file" id="fi2" accept=".xlsx,.xls,.csv" style="display:none" onchange="doFile(this,'${mod}')">
  <div id="ir2" style="margin-top:14px"></div>
</div>`;}

function showImport(mod){showModal('import',{mod});}
function doDrop(e,mod){e.preventDefault();e.target.closest('.dz').classList.remove('over');const f=e.dataTransfer.files[0];if(f)processFile(f,mod,'ir2');}
function doFile(el,mod){if(el.files[0])processFile(el.files[0],mod,'ir2');}

function processFile(file,mod,resId){
  const res=document.getElementById(resId);
  if(res)res.innerHTML=`<div class="alert a-info"><span class="a-ic">⏳</span><div class="a-bd"><strong>Đang đọc file...</strong><p>${file.name}</p></div></div>`;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws);
      if(!data.length){if(res)res.innerHTML=`<div class="alert a-warn"><span class="a-ic">⚠️</span><div class="a-bd"><strong>File rỗng</strong><p>Sheet đầu tiên không có dữ liệu.</p></div></div>`;return;}
      saveImport(mod,data,file.name,res);
    }catch(err){
      if(res)res.innerHTML=`<div class="alert a-err"><span class="a-ic">❌</span><div class="a-bd"><strong>Lỗi đọc file</strong><p>${err.message}</p></div></div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function saveImport(mod,data,fname,resEl){
  db.ref(`imports/${S.user.uid}/${mod}`).set({data,fname,at:Date.now(),by:S.profile?.name||S.user.email}).then(()=>{
    S.data[mod]=data;
    if(resEl)resEl.innerHTML=`<div class="alert a-ok"><span class="a-ic">✅</span><div class="a-bd"><strong>Import thành công: ${data.length} dòng</strong><p>File: ${fname} — Biểu đồ đã cập nhật tự động.</p></div></div>`;
    toast(`✅ Import ${data.length} dòng thành công`,'t-ok');
    checkAlerts(mod,data);
    updateChartFromData(mod,data);
  }).catch(e=>{
    if(resEl)resEl.innerHTML=`<div class="alert a-err"><span class="a-ic">❌</span><div class="a-bd"><strong>Lỗi lưu dữ liệu</strong><p>${e.message}</p></div></div>`;
  });
}

function checkAlerts(mod,data){
  const warns=[];
  data.forEach((row,i)=>{
    if(mod==='qc'){
      const temp=parseFloat(row['Nhiệt độ']||row['nhiet_do']||row['temperature']||0);
      const rate=parseFloat(row['Tỉ lệ lỗi']||row['ti_le_loi']||row['error_rate']||0);
      if(temp>7)warns.push(`Hàng ${i+2}: Nhiệt độ ${temp}°C — NGHIÊM TRỌNG!`);
      else if(temp>4)warns.push(`Hàng ${i+2}: Nhiệt độ ${temp}°C — Cảnh báo`);
      if(rate>5)warns.push(`Hàng ${i+2}: Tỉ lệ lỗi ${rate}% — NGHIÊM TRỌNG!`);
      else if(rate>2)warns.push(`Hàng ${i+2}: Tỉ lệ lỗi ${rate}% — Cảnh báo`);
    }
    if(mod==='kk'){
      const cl=parseFloat(row['Chênh lệch %']||row['chenh_lech']||0);
      if(cl>5)warns.push(`Hàng ${i+2}: Chênh lệch ${cl}% — NGHIÊM TRỌNG!`);
      else if(cl>2)warns.push(`Hàng ${i+2}: Chênh lệch ${cl}% — Cảnh báo`);
    }
  });
  if(warns.length){
    toast(`⚠️ ${warns.length} cảnh báo vượt ngưỡng!`,'t-warn');
    db.ref(`alerts/${S.user.uid}/${mod}`).set({warns,at:Date.now()});
  }
}

function updateChartFromData(mod,data){
  // Build month labels & series from imported data if columns match
  try{
    const byMonth={};
    data.forEach(r=>{
      const d=r['Ngày']||r['ngay']||r['date'];
      if(!d)return;
      const m=new Date(d).getMonth();
      if(isNaN(m))return;
      const lb=`T${m+1}`;
      byMonth[lb]=(byMonth[lb]||0)+1;
    });
    const labels=Object.keys(byMonth),vals=Object.values(byMonth);
    const cid=mod==='kk'?'c-kk-bar':mod==='qc'?'c-qc-trend':'c-bc-bar';
    const ch=S.charts[cid];
    if(ch&&labels.length){ch.data.labels=labels;ch.data.datasets[0].data=vals;ch.update();}
  }catch(e){}
}

const TH=['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];

function mkC(id,type,labels,datasets,opts={}){
  const el=document.getElementById(id);if(!el)return;
  if(S.charts[id])S.charts[id].destroy();
  S.charts[id]=new Chart(el,{type,
    data:{labels,datasets:datasets.map((d,i)=>({
      ...d,
      borderColor:d.borderColor||CC[i],
      backgroundColor:d.bg||(type==='line'?CC[i]+'22':(type==='doughnut'||type==='pie'?CC:CC[i])),
      borderWidth:2,tension:.4,fill:type==='line'&&!d.noFill,pointRadius:3,
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12}}},
      scales:(type==='pie'||type==='doughnut')?{}:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'#f0f2f7'}}},
      ...opts}
  });
}

/* ══════════════════════════════════════════
   TREE EDITOR ENGINE
══════════════════════════════════════════ */
let TC={};   // cache: key → nodes[]
let TO={};   // open state: nodeId → bool

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function tLoad(key){
  const snap=await db.ref(`trees/${key}`).get();
  TC[key]=snap.exists()?(snap.val()||[]):[];
  return TC[key];
}
async function tSave(key){await db.ref(`trees/${key}`).set(TC[key]||[]);}

function tRender(key,nodes,editable){
  function level(pid){
    const items=(nodes||[]).filter(n=>(n.pid||null)===pid).sort((a,b)=>a.ord-b.ord);
    if(!items.length)return editable?`<div class="te-empty-node">📂 Thư mục rỗng – dùng nút + để thêm</div>`:`<div class="te-empty-node">Chưa có nội dung</div>`;
    return items.map(n=>{
      const isF=n.t==='f';
      const open=TO[n.id];
      const hasKids=nodes.some(x=>x.pid===n.id);
      const ic=isF?(open?'📂':'📁'):(n.ic||'📄');
      return`<div>
        <div class="te-row" onclick="tToggle('${key}','${n.id}',${isF})">
          <span class="te-arr ${(!isF||!hasKids)?'h':''} ${open?'o':''}">▶</span>
          <span class="te-ico">${ic}</span>
          <span class="te-lbl">${escH(n.lb)}</span>
          ${editable?`<div class="te-act" onclick="event.stopPropagation()">
            ${isF?`<button class="ta-btn ta-add" title="Thêm thư mục con" onclick="tAdd('${key}','${n.id}','f')">📁</button>
                   <button class="ta-btn ta-add" title="Thêm mục" onclick="tAdd('${key}','${n.id}','i')">📄</button>`:''}
            <button class="ta-btn ta-ren" title="Đổi tên" onclick="tRen('${key}','${n.id}')">✏️</button>
            <button class="ta-btn ta-del" title="Xóa" onclick="tDel('${key}','${n.id}')">🗑</button>
          </div>`:''}
        </div>
        ${isF&&open?`<div class="te-children">${level(n.id)}</div>`:''}
        ${!isF&&open&&n.content?`<div class="te-leaf-content">${escH(n.content)}</div>`:''}
      </div>`;
    }).join('');
  }
  return`<div class="tree-ed">
    ${editable?`<div class="te-bar">
      <span style="font-size:12px;font-weight:700;color:var(--t2);align-self:center">Admin:</span>
      <button class="btn b-ok2 b-sm" onclick="tAdd('${key}',null,'f')">📁 + Thư mục</button>
      <button class="btn b-pri b-sm" onclick="tAdd('${key}',null,'i')">📄 + Mục</button>
    </div>`:''}
    <div style="padding:6px" id="tree-inner-${key}">${level(null)}</div>
  </div>`;
}

function tReRender(key){
  const el=document.getElementById(`tree-${key}`);
  if(el)el.innerHTML=tRender(key,TC[key]||[],isAdmin());
}

function tToggle(key,id,isF){
  if(!isF)return;
  TO[id]=!TO[id];
  tReRender(key);
}

function tAdd(key,pid,type){
  const prompt_text=type==='f'?'Tên thư mục mới:':'Tên mục mới:';
  const lb=prompt(prompt_text,'');
  if(!lb||!lb.trim())return;
  const nodes=TC[key]||[];
  const siblings=nodes.filter(n=>(n.pid||null)===(pid||null));
  nodes.push({id:'n'+Date.now(),lb:lb.trim(),ic:type==='f'?'📁':'📄',t:type,pid:pid||null,ord:siblings.length,content:''});
  TC[key]=nodes;
  if(pid)TO[pid]=true;
  tSave(key).then(()=>{tReRender(key);toast(`✅ Đã thêm: ${lb.trim()}`,'t-ok');});
}

function tDel(key,id){
  const nodes=TC[key]||[];
  const node=nodes.find(n=>n.id===id);
  if(!node)return;
  const hasKids=nodes.some(n=>n.pid===id);
  const msg=hasKids?`Xóa "${node.lb}" và toàn bộ mục con?`:`Xóa "${node.lb}"?`;
  if(!confirm(msg))return;
  const rm=new Set([id]);
  let changed=true;
  while(changed){changed=false;nodes.forEach(n=>{if(rm.has(n.pid)&&!rm.has(n.id)){rm.add(n.id);changed=true;}});}
  TC[key]=nodes.filter(n=>!rm.has(n.id));
  tSave(key).then(()=>{tReRender(key);toast(`Đã xóa: ${node.lb}`,'t-ok');});
}

function tRen(key,id){
  const nodes=TC[key]||[];
  const node=nodes.find(n=>n.id===id);
  if(!node)return;
  const newLb=prompt('Đổi tên:',node.lb);
  if(!newLb||newLb===node.lb)return;
  node.lb=newLb.trim();
  tSave(key).then(()=>{tReRender(key);toast(`Đã đổi tên: ${newLb}`,'t-ok');});
}

// Wrapper: render tree section, auto-load if not cached
function tSection(key){
  if(TC[key]!==undefined){
    return`<div id="tree-${key}">${tRender(key,TC[key],isAdmin())}</div>`;
  }
  // async load then inject
  setTimeout(()=>{
    tLoad(key).then(nodes=>{
      const el=document.getElementById(`tree-${key}`);
      if(el)el.innerHTML=tRender(key,nodes,isAdmin());
    });
  },0);
  return`<div id="tree-${key}"><div style="padding:20px;text-align:center;color:var(--t2);font-size:13px">⏳ Đang tải...</div></div>`;
}

/* ══════════════════════════════════════════
   JSZip xlsx helpers — viết trực tiếp vào XML
   giữ nguyên 100% style/border/merge gốc
══════════════════════════════════════════ */
function _xlCol(n){let r='';n++;while(n>0){n--;r=String.fromCharCode(65+n%26)+r;n=Math.floor(n/26);}return r;}
function _ex(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function _xlSheetPath(zip,name){
  const wb=await zip.file('xl/workbook.xml').async('text');
  const rl=await zip.file('xl/_rels/workbook.xml.rels').async('text');
  const escaped=name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/&/g,'&amp;');
  const nm=wb.match(new RegExp(`<sheet[^>]+name="${escaped}"[^>]+r:id="([^"]+)"`));
  if(!nm)return null;
  const fm=rl.match(new RegExp(`<Relationship[^>]+Id="${nm[1]}"[^>]+Target="([^"]+)"`));
  if(!fm)return null;
  const t=fm[1];
  return t.startsWith('/')?t.slice(1):t.startsWith('worksheets/')?`xl/${t}`:`xl/worksheets/${t}`;
}

function _xlColIdx(s){let n=0;for(let i=0;i<s.length;i++)n=n*26+(s.charCodeAt(i)-64);return n-1;}
function _xlSetCell(xml,rowIdx,colIdx,value,type){
  const r=rowIdx+1, c=_xlCol(colIdx), ref=c+r;
  const cell=type==='n'
    ?`<c r="${ref}"><v>${value}</v></c>`
    :`<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${_ex(String(value))}</t></is></c>`;
  const rowStart=xml.indexOf(`<row r="${r}"`);
  if(rowStart<0)return xml.replace('</sheetData>',`<row r="${r}">${cell}</row></sheetData>`);
  const rowEnd=xml.indexOf('</row>',rowStart);
  if(rowEnd<0)return xml;
  const rowSlice=xml.slice(rowStart,rowEnd);
  // Nếu cell đã tồn tại trong row — replace
  const cellPos=rowSlice.indexOf(`r="${ref}"`);
  if(cellPos>=0){
    const absPos=rowStart+cellPos;
    const cs=xml.lastIndexOf('<c ',absPos);
    if(cs>=rowStart){
      const tagEnd=xml.indexOf('>',cs);
      if(tagEnd>=0){
        const isSelf=xml[tagEnd-1]==='/';
        const ce=isSelf?tagEnd+1:xml.indexOf('</c>',tagEnd)+4;
        if(ce>0)return xml.slice(0,cs)+cell+xml.slice(ce);
      }
    }
  }
  // Cell chưa tồn tại — insert đúng vị trí theo thứ tự cột tăng dần
  const pat=/<c r="([A-Z]+)\d+"/g;
  let insertAt=rowEnd;
  let m;
  while((m=pat.exec(rowSlice))!==null){
    if(_xlColIdx(m[1])>colIdx){
      const abs=rowStart+m.index;
      const cs=xml.lastIndexOf('<c ',abs);
      if(cs>=rowStart){insertAt=cs;}
      break;
    }
  }
  return xml.slice(0,insertAt)+cell+xml.slice(insertAt);
}

async function _xlApply(origBuf,sheetUpdates){
  // sheetUpdates: [{name, updates:[{r,c,v,t}]}]
  const zip=await JSZip.loadAsync(origBuf);
  for(const su of sheetUpdates){
    const path=await _xlSheetPath(zip,su.name);
    if(!path){console.warn('Sheet not found:',su.name);continue;}
    let xml=await zip.file(path).async('text');
    for(const u of su.updates)xml=_xlSetCell(xml,u.r,u.c,u.v,u.t||'s');
    zip.file(path,xml);
  }
  return zip.generateAsync({type:'arraybuffer',compression:'DEFLATE',compressionOptions:{level:1}});
}

function nsProcess(wb,fname){
  const log=[`▶  ${fname}`];
  const sn=wb.SheetNames;
  const ssName=sn.find(s=>{const l=s.toLowerCase();return l.includes('so')&&l.includes('nh');});
  const navName=sn.find(s=>/^nav$/i.test(s.trim()));
  const smlName=sn.find(s=>/^(sml|hapi)$/i.test(s.trim()));
  if(!ssName||!navName||!smlName)
    return{ok:false,log:[...log,`✗ Thiếu sheet (có: ${sn.join(', ')}) — cần: So sánh + NAV + SML/HAPI`]};

  const dataSS=XLSX.utils.sheet_to_json(wb.Sheets[ssName],{header:1,defval:null,raw:true});
  const header=dataSS[0]||[];
  const findCol=names=>{
    for(const nm of names){
      const i=header.findIndex(h=>h&&String(h).toLowerCase().includes(nm.toLowerCase()));
      if(i>=0)return i;
    }return null;
  };
  const colMaSP=findCol(['mã-sp','ma-sp','mã sp','ma sp']);
  const colSS=findCol(['ss']);
  const colLyDo=findCol(['lý do','ly do']);
  if(colMaSP===null||colLyDo===null)
    return{ok:false,log:[...log,'✗ Không tìm được cột Mã SP hoặc Lý do trong sheet So sánh']};

  const items=[];
  for(let r=1;r<dataSS.length;r++){
    const row=dataSS[r]||[];
    const ma=String(row[colMaSP]??'').trim();
    if(!ma||ma==='null'||ma==='undefined')continue;
    items.push({rowIdx:r+1,maSP:ma,ssQty:colSS!==null&&row[colSS]!=null?parseFloat(row[colSS])||0:0});
  }
  const maSet=new Set(items.map(i=>i.maSP));
  log.push(`   Sheet SS: ${items.length} mã, ${items.filter(i=>i.ssQty!==0).length} có lệch`);

  const dataN=XLSX.utils.sheet_to_json(wb.Sheets[navName],{header:1,defval:null,raw:true});
  const navHdr=(dataN[0]||[]).map(v=>String(v??'').trim().toLowerCase());
  const nCol=kws=>{for(const k of kws){const i=navHdr.findIndex(h=>h.includes(k));if(i>=0)return i;}return null;};
  const niMa=nCol(['mã hàng','ma hang','mã sp','ma sp'])??3;
  const niQty=nCol(['số lượng','so luong'])??6;
  const niOrd=nCol(['mã số nhận','ma so nhan','chứng từ','đơn đặt hàng'])??2;
  const navData={};
  for(let r=1;r<dataN.length;r++){
    const row=dataN[r]||[];
    const ma=String(row[niMa]??'').trim();
    if(!maSet.has(ma))continue;
    const ord=String(row[niOrd]??'').trim();
    if(!navData[ma])navData[ma]={};
    navData[ma][ord]=(navData[ma][ord]||0)+(parseFloat(row[niQty])||0);
  }

  const dataS=XLSX.utils.sheet_to_json(wb.Sheets[smlName],{header:1,defval:null,raw:true});
  const smlData={};
  for(let r=1;r<dataS.length;r++){
    const row=dataS[r]||[];
    const ma=String(row[2]??'').trim();
    if(!maSet.has(ma))continue;
    const ord=String(row[6]??'').trim();
    const qty=parseFloat(row[4])||0;
    const sign=String(row[7]??'').includes('Xuất')?-1:1;
    if(!smlData[ma])smlData[ma]={};
    smlData[ma][ord]=(smlData[ma][ord]||0)+sign*qty;
  }

  const genLyDo=(ma,ssQty)=>{
    if(ssQty===0)return'';
    const navRaw=navData[ma]||{};
    const smlRaw=smlData[ma]||{};
    const navOrd=Object.fromEntries(Object.entries(navRaw).filter(([,v])=>Math.abs(v)>0.001));
    const navZero=new Set(Object.keys(navRaw).filter(k=>Math.abs(navRaw[k])<=0.001));
    const smlOrd=Object.fromEntries(Object.entries(smlRaw).filter(([,v])=>Math.abs(v)>0.001));
    const all=new Set([...Object.keys(navOrd),...Object.keys(smlOrd),...navZero]);
    const reasons=[];
    for(const ord of [...all].sort()){
      if(!ord)continue;
      const nq=navOrd[ord],sq=smlOrd[ord],iz=navZero.has(ord);
      if(iz&&sq!=null)reasons.push(`NAV có chứng từ ${sq<0?'nhập':'xuất'} ${ord} (${Math.round(Math.abs(sq))} sp) nhưng Hapi không có`);
      else if(nq==null&&!iz&&sq!=null)reasons.push(`Hapi ${sq>0?'nhập':'xuất'} đơn ${ord} (${Math.round(Math.abs(sq))} sp) nhưng NAV không có chứng từ`);
      else if(nq!=null&&sq==null)reasons.push(`NAV có chứng từ ${nq>0?'nhập':'xuất'} ${ord} (${Math.round(Math.abs(nq))} sp) nhưng Hapi không có`);
      else if(nq!=null&&sq!=null){
        const df=Math.abs(sq)-Math.abs(nq);
        if(Math.abs(df)>0.001)reasons.push(`Đơn ${ord} lệch: NAV=${Math.round(Math.abs(nq))} sp, Hapi=${Math.round(Math.abs(sq))} sp (${df>0?'Hapi':'NAV'} hơn ${Math.round(Math.abs(df))} sp)`);
      }
    }
    return reasons.length?reasons.join('; '):`Lệch ${Math.round(Math.abs(ssQty))} sp – chưa xác định được chứng từ cụ thể`;
  };

  const updates=[];
  let lech=0,khop=0;
  for(const item of items){
    const ld=genLyDo(item.maSP,item.ssQty);
    updates.push({r:item.rowIdx-1,c:colLyDo,v:ld,t:'s'});
    if(item.ssQty!==0)lech++;else khop++;
  }
  log.push(`   ✓ ${khop} mã khớp  |  ${lech} mã lệch`,'═══ HOÀN THÀNH ═══');
  return{ok:true,log,ssName,updates};
}

function bbkkProcess(wbD,wbF,fname){
  const log=[`▶  ${fname}`];
  // ── Nạp DMHH ──────────────────────────────────────────────
  const snD=wbD.SheetNames;
  if(snD.length<2)return{ok:false,log:[...log,'❌ File DMHH cần ít nhất 2 sheet (HT và KHT)']};
  const readDM=(sn,skipRows)=>{
    const raw=XLSX.utils.sheet_to_json(wbD.Sheets[sn],{header:1,defval:null,raw:true});
    const hdr=raw[skipRows]||[];
    const cMa=hdr.findIndex(h=>h&&/mã hàng|ma hang/i.test(String(h)));
    const cTen=hdr.findIndex(h=>h&&/tên sp|ten sp|tên hàng|ten hang/i.test(String(h)));
    const cNh=hdr.findIndex(h=>h&&/nhóm|nhom/i.test(String(h)));
    const maSet=new Set(),maToTen={},maToNganh={};
    for(let r=skipRows+1;r<raw.length;r++){
      const row=raw[r]||[];
      if(cMa<0||row[cMa]==null)continue;
      const ma=String(Math.round(parseFloat(row[cMa]))||'').trim();
      if(!ma||ma==='NaN'||ma==='0')continue;
      maSet.add(ma);
      if(cTen>=0&&row[cTen])maToTen[ma]=String(row[cTen]);
      if(cNh>=0&&row[cNh])maToNganh[ma]=String(row[cNh]);
    }
    return{maSet,maToTen,maToNganh};
  };
  const dm0=readDM(snD[0],4);
  const dm1=readDM(snD[1],0);
  const maHT=dm0.maSet,maKHT=dm1.maSet;
  const maToTen={...dm0.maToTen,...dm1.maToTen};
  const maToNganh={...dm0.maToNganh,...dm1.maToNganh};
  log.push(`   DMHH: HT ${maHT.size} mã | KHT ${maKHT.size} mã`);
  const lookup=m=>maKHT.has(m)?'Không hỗ trợ':maHT.has(m)?'Hỗ trợ':'Không tìm thấy';

  // ── Nạp BBKK ──────────────────────────────────────────────
  const bbName=wbF.SheetNames.find(s=>/bbkk/i.test(s))||wbF.SheetNames[0];
  if(!bbName)return{ok:false,log:[...log,'❌ Không tìm thấy sheet BBKK']};
  const rawBB=XLSX.utils.sheet_to_json(wbF.Sheets[bbName],{header:1,defval:null,raw:true});
  const data=[];
  for(let r=8;r<rawBB.length;r++){
    const row=rawBB[r]||[];
    if(row[2]==null)continue;
    const ma=String(Math.round(parseFloat(row[2]))||'').trim();
    if(!ma||ma==='NaN'||ma==='0')continue;
    const tgt=parseFloat(row[11])||0,tgth=parseFloat(row[13])||0;
    data.push({
      origRow:r,excelRow:r+1,
      LoaiHang:String(row[1]||'').trim().toUpperCase(),MaSP:ma,
      Barcode:String(row[3]||'').split('.')[0],
      TenSP:String(row[4]||''),
      TGthua:tgt,TGthieu:tgth,CL_net:tgt+tgth,
      LyDo:String(row[14]||''),
      HoTro:lookup(ma)
    });
  }
  log.push(`   BBKK: ${data.length} dòng`);
  const bc2ma={};
  data.forEach(d=>{if(d.Barcode&&d.Barcode!=='null'&&d.Barcode!=='nan'&&d.Barcode!=='0')bc2ma[d.Barcode]=d.MaSP;});

  // ── Nhầm mã ───────────────────────────────────────────────
  const kiemTraNham=(maSP,tenSP,lyDo)=>{
    if(!lyDo||lyDo==='null')return{hopLe:null};
    const ld=lyDo.trim();
    const hasKw=/nhầm|bán nhầm|nhầm mã/i.test(ld);
    const codeOnly=/^[\d\s,;/.\-]+(sl\s*\d+)?$/i.test(ld)&&/\d{5,}/.test(ld);
    if(!hasKw&&!codeOnly)return{hopLe:null};
    const maDois=[...new Set((ld.match(/\b(\d{5,6})\b/g)||[]))];
    (ld.match(/\b(\d{8,14})\b/g)||[]).forEach(bc=>{const mp=bc2ma[bc];if(mp&&!maDois.includes(mp))maDois.push(mp);});
    if(!maDois.length)return{hopLe:null};
    const bad=maDois.filter(md=>{
      const tenDu=maToTen[md]||'';
      const ng1=maToNganh[maSP]||'',ng2=maToNganh[md]||'';
      const chung=[...tenSP.toLowerCase().split(/\s+/)].filter(w=>w.length>1&&tenDu.toLowerCase().includes(w));
      return!(ng1&&ng1===ng2)&&chung.length<2;
    });
    return bad.length?{hopLe:false,moTa:`Mã đối: ${bad.join(',')} không cùng ngành`}:{hopLe:true};
  };

  const nhamMap={};
  let nHL=0,nKHL=0;
  const warnLines=[];
  for(const d of data){
    const res=kiemTraNham(d.MaSP,d.TenSP,d.LyDo);
    nhamMap[d.origRow]=res;
    if(res.hopLe===true){nHL++;}
    if(res.hopLe===false){nKHL++;if(d.HoTro==='Không hỗ trợ')warnLines.push(`   ${d.MaSP} '${d.TenSP.slice(0,30)}' → ${res.moTa||''}`);}
  }

  const ht=data.filter(d=>d.HoTro==='Hỗ trợ');
  const kht=data.filter(d=>d.HoTro==='Không hỗ trợ');
  const ntf=data.filter(d=>d.HoTro==='Không tìm thấy');
  const htNet=ht.reduce((s,d)=>s+d.CL_net,0);
  const khtNet=kht.reduce((s,d)=>s+d.CL_net,0);
  const tongCL=htNet+khtNet;
  log.push(`   HT: ${ht.length} mã (${vfmt(htNet)}đ) | KHT: ${kht.length} mã (${vfmt(khtNet)}đ) | NTF: ${ntf.length}`);
  log.push(`   Tổng CL: ${vfmt(tongCL)}đ`);
  if(warnLines.length){log.push(`   ⚠ ${nKHL} dòng nhầm mã không hợp lệ:`);warnLines.slice(0,8).forEach(l=>log.push(l));}
  else if(nHL>0)log.push(`   ✓ ${nHL} dòng nhầm mã hợp lệ`);

  // ── Đền bù pool ───────────────────────────────────────────
  const poolRows=[];
  for(const d of kht){
    const{hopLe}=nhamMap[d.origRow]||{};
    if(hopLe===true){
      const paired=(d.LyDo.match(/\b(\d{5,6})\b/g)||[]);
      (d.LyDo.match(/\b(\d{8,14})\b/g)||[]).forEach(bc=>{const mp=bc2ma[bc];if(mp&&!paired.includes(mp))paired.push(mp);});
      if(!paired.some(pm=>lookup(pm)!=='Hỗ trợ'))continue;
    }
    poolRows.push(d);
  }
  const catNet={};
  for(const d of poolRows)catNet[d.LoaiHang]=(catNet[d.LoaiHang]||0)+d.CL_net;
  const bdSeries=Object.entries(catNet).filter(([,v])=>v<0).sort(([,a],[,b])=>a-b);
  const denBuTong=bdSeries.reduce((s,[,v])=>s+Math.abs(v),0);
  if(bdSeries.length){
    log.push('   Loại Hàng KHT cần đền bù:');
    bdSeries.forEach(([lh,v])=>log.push(`      ${lh}: ${vfmt(v)}đ → ĐB: ${vfmt(Math.abs(v))}đ`));
  }
  log.push(`   → Tổng gợi ý đền bù: ${vfmt(denBuTong)}đ`);

  // ── Build update lists (không chỉnh workbook — dùng JSZip để write) ──
  const bbUpdates=[];
  // Header dòng 6 (index 5)
  ['Check','Nhầm mã','Đề xuất ĐB'].forEach((v,i)=>bbUpdates.push({r:5,c:16+i,v,t:'s'}));
  for(const d of data){
    const er=d.excelRow-1;
    bbUpdates.push({r:er,c:16,v:d.HoTro,t:'s'});
    const{hopLe}=nhamMap[d.origRow]||{};
    if(hopLe===true)bbUpdates.push({r:er,c:17,v:'✓ Hợp lệ',t:'s'});
    else if(hopLe===false)bbUpdates.push({r:er,c:17,v:'✗ Không hợp lệ',t:'s'});
    if(d.HoTro==='Không hỗ trợ'&&d.CL_net<0)bbUpdates.push({r:er,c:18,v:Math.abs(d.CL_net),t:'n'});
  }

  // ── Đề xuất sheet ──────────────────────────────────────────────
  const dxName=wbF.SheetNames.find(s=>s.trim()==='Đề xuất');
  const dxUpdates=[];
  if(dxName){
    // reason_tag cho từng Loại Hàng trong pool KHT âm
    const khtAmPool=poolRows.filter(d=>d.CL_net<0);
    const reasonTag=lh=>{
      const grp=khtAmPool.filter(d=>d.LoaiHang===lh);
      const tags=[];
      if(grp.some(d=>/không rõ|chưa rõ/i.test(d.LyDo)))tags.push('không rõ NN');
      const khl=grp.filter(d=>nhamMap[d.origRow]?.hopLe===false);
      if(khl.length)tags.push(`bán nhầm KHL(${khl.length})`);
      const hl=grp.filter(d=>nhamMap[d.origRow]?.hopLe===true);
      if(hl.length)tags.push(`bán nhầm HL(${hl.length}), NET âm`);
      return tags.join(' | ');
    };
    const caseNote=tongCL>=0
      ?`CL DƯƠNG (${vfmt(tongCL)}đ) — KHT dương bù âm trong cùng loại hàng`
      :Math.abs(tongCL)>=Math.abs(khtNet)
        ?`CL ÂM (${vfmt(tongCL)}đ) — Cân nhắc đền bù 100% tổng CL`
        :`KHT âm (${vfmt(khtNet)}đ) lớn hơn tổng CL — Sàn đền bù tối thiểu = |KHT|`;
    const nhamSummary=nHL||nKHL?`Nhầm mã: ${nHL} hợp lệ${nKHL?' / '+nKHL+' KHÔNG hợp lệ':''}`:'';
    const ksclText=`[KSCL KIỂM TRA]\nHT: ${vfmt(htNet)}đ | KHT: ${vfmt(khtNet)}đ | Tổng CL: ${vfmt(tongCL)}đ\nLoại Hàng KHT có NET âm cần đền bù:\n${bdSeries.map(([l,v])=>{const tag=reasonTag(l);return`  ${l}: ${vfmt(v)}đ → Đền bù: ${vfmt(Math.abs(v))}đ`+(tag?`  [${tag}]`:'');}).join('\n')||'  (Không có)'}\n→ TỔNG GỢI Ý ĐỀN BÙ: ${vfmt(denBuTong)}đ\n${caseNote}${nhamSummary?'\n'+nhamSummary:''}`;
    const rawDX=XLSX.utils.sheet_to_json(wbF.Sheets[dxName],{header:1,defval:null,raw:true});
    let chkR=-1,chkC=-1;
    for(let r=0;r<Math.min(rawDX.length,20)&&chkR<0;r++){
      const row=rawDX[r]||[];
      for(let c=0;c<row.length;c++){
        if(String(row[c]||'').trim().toLowerCase()==='check'){chkR=r;chkC=c;break;}
      }
    }
    if(chkR>=0){
      dxUpdates.push({r:chkR+1,c:chkC,v:ksclText,t:'s'});
      log.push(`   ✓ Ghi KSCL vào ô Check (dòng ${chkR+2}, cột ${_xlCol(chkC)})`);
    } else {
      let tongR=-1;
      for(let r=0;r<rawDX.length;r++){
        if((rawDX[r]||[]).some(c=>/^tổng$|^tong$/i.test(String(c||'').trim()))){tongR=r;break;}
      }
      const insR=tongR>=0?tongR+1:(XLSX.utils.decode_range(wbF.Sheets[dxName]['!ref']||'A1').e.r+2);
      dxUpdates.push({r:insR,c:0,v:ksclText,t:'s'});
      log.push(`   ✓ Ghi KSCL vào Đề xuất (dòng ${insR+1})`);
    }
  }

  if(ntf.length){
    log.push(`   ⚠ ${ntf.length} mã không có trong DMHH`);
    ntf.slice(0,5).forEach(d=>log.push(`      ${d.MaSP}  ${d.TenSP.slice(0,50)}`));
  }
  log.push('═══ HOÀN THÀNH ═══');
  return{ok:true,log,bbName,bbUpdates,dxName:dxName||null,dxUpdates};
}

function vfmt(n){return(Math.round(n)||0).toLocaleString('vi-VN');}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
render();
</script>
